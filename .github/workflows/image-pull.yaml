---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch:
          - default
          - pull
      fail-fast: false
    outputs:
      default: ${{ steps.extract.outputs.default }}
      pull: ${{ steps.extract.outputs.pull }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ matrix.branch == 'default' && github.event.repository.default_branch || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gather Images
        uses: docker://ghcr.io/allenporter/flux-local:v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            get cluster
            --all-namespaces
            --path /github/workspace/kubernetes/flux/cluster
            --sources "home-kubernetes"
            --enable-images
            --only-images
            --output json
            --output-file images.json

      - name: Extract Images
        id: extract
        run: |
          delimiter="$(openssl rand -hex 16)"
          {
            echo "${{ matrix.branch }}<<${delimiter}"
            jq --compact-output '.' images.json
            echo ""
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

          echo '## Branch ${{ matrix.branch }} images' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq '.' images.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  diff:
    if: ${{ needs.extract.outputs.default != needs.extract.outputs.pull }}
    needs: extract
    name: Image Pull - Diff Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.diff.outputs.images }}
    steps:
      - name: Diff Images
        id: diff
        env:
          DEFAULT_IMAGES: ${{ needs.extract.outputs.default }}
          PULL_IMAGES: ${{ needs.extract.outputs.pull }}
        run: |
          images=$(jq --compact-output --null-input \
              --argjson f1 "$DEFAULT_IMAGES" \
              --argjson f2 "$PULL_IMAGES" \
              '$f2 - $f1' \
          )
          echo "images=${images}" >> "$GITHUB_OUTPUT"

          echo '## New images to Pull' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$images" | jq >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  pull:
    if: ${{ needs.diff.outputs.images != '[]' }}
    needs: diff
    name: Image Pull - Pull Images
    runs-on: arc-runner-set-flux-talos
    strategy:
      matrix:
        image: ${{ fromJSON(needs.diff.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    env:
      MATRIX_IMAGE: ${{ matrix.image }}
    steps:
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install talosctl
        run: curl -fsSL https://talos.dev/install | sh

      - name: Configure Talos API Access
        run: |
          # Debug: Check what secrets exist
          echo "Checking for Talos ServiceAccount secrets..."
          kubectl get secrets -n actions-runner-system | grep -E "arc-runner-talos|talos-api"

          # Check if the secret exists (without -talos-secrets suffix)
          echo ""
          echo "Checking arc-runner-talos-api secret..."
          if kubectl get secret arc-runner-talos-api -n actions-runner-system &>/dev/null; then
            echo "Secret arc-runner-talos-api found!"
            echo "Secret type:"
            kubectl get secret arc-runner-talos-api -n actions-runner-system -o jsonpath='{.type}'
            echo ""
            echo "Data keys available:"
            kubectl get secret arc-runner-talos-api -n actions-runner-system -o jsonpath='{.data}' | jq -r 'keys[]' 2>/dev/null || echo "Failed to parse JSON, showing raw:"
            kubectl get secret arc-runner-talos-api -n actions-runner-system -o yaml

            # Try to extract talosconfig
            echo ""
            echo "Attempting to extract talosconfig..."
            if kubectl get secret arc-runner-talos-api -n actions-runner-system -o jsonpath='{.data.talosconfig}' > /tmp/talosconfig.b64 2>/dev/null && [ -s /tmp/talosconfig.b64 ]; then
              base64 -d /tmp/talosconfig.b64 > /tmp/talosconfig
              echo "Talosconfig extracted, size: $(wc -c < /tmp/talosconfig) bytes"
              echo "First 100 chars:"
              head -c 100 /tmp/talosconfig || true
            else
              echo "ERROR: talosconfig key not found or empty in secret!"
              exit 1
            fi
          else
            echo "ERROR: arc-runner-talos-api secret not found!"
            exit 1
          fi

      - name: Pull Image on Worker Nodes
        run: |
          export TALOSCONFIG=/tmp/talosconfig
          # Verify talosconfig is valid
          if [ ! -s /tmp/talosconfig ]; then
            echo "ERROR: Talosconfig file is empty!"
            exit 1
          fi

          # Pull image on all worker nodes
          talosctl --nodes 10.0.10.38,10.0.10.39,10.0.10.40 image pull "${MATRIX_IMAGE}"

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
