---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name unifi-phantom-clients-cleanup-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        UNIFI_HOST: "https://10.0.10.1"
        UNIFI_SITE: "default"
        UNIFI_USERNAME: "{{ .Unifi__User }}"
        UNIFI_PASSWORD: "{{ .Unifi__Pass }}"
        UNIFI_UDMP: "true"
        UNIFI_VALIDATE_CERTIFICATE: "false"
  dataFrom:
    - extract:
        key: unifi
