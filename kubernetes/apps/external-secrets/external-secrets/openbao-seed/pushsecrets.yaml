apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: bw-seed-actions-runner-controller
spec:
  refreshInterval: 1h
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: bw-seed-actions-runner-controller
  data:
    - match:
        secretKey: "ActionsRunnerController__GithubAppId"
        remoteRef:
          remoteKey: actions-runner-controller
    - match:
        secretKey: "ActionsRunnerController__GithubInstallationId"
        remoteRef:
          remoteKey: actions-runner-controller
    - match:
        secretKey: "ActionsRunnerController__GithubPrivateKey"
        remoteRef:
          remoteKey: actions-runner-controller
