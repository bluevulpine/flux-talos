---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: mealie-secret-push
  namespace: productivity
spec:
  refreshInterval: 1h
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: mealie-secret
  data:
    - match:
        secretKey: INIT_POSTGRES_DBNAME
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: INIT_POSTGRES_HOST
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: INIT_POSTGRES_USER
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: INIT_POSTGRES_PASS
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: INIT_POSTGRES_SUPER_PASS
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: DB_ENGINE
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: POSTGRES_URL_OVERRIDE
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: OIDC_CLIENT_ID
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: OIDC_CLIENT_SECRET
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: OPENAI_API_KEY
        remoteRef:
          remoteKey: productivity/mealie-secret
    - match:
        secretKey: OPENAI_BASE_URL
        remoteRef:
          remoteKey: productivity/mealie-secret
