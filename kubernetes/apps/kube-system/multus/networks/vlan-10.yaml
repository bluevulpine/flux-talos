---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
# NetworkAttachmentDefinition for Management VLAN 10 access via Multus
# Allows pods to communicate directly with devices on VLAN 10
# Interface: bond0.10 on brokkr workers (VLAN 10 subinterface)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-10
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "vlan-10",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0.10",
          "mode": "bridge",
          "ipam": {
            "type": "static"
          }
        },
        {
          "type": "sbr"
        }
      ]
    }
