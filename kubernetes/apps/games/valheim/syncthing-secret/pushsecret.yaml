---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: valheim-volsync-syncthing-secret-push
  namespace: games
spec:
  refreshInterval: 1h
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: valheim-volsync-syncthing-secret
  data:
    - match:
        secretKey: SYNCTHING_REMOTE_DEVICE_ID
        remoteRef:
          remoteKey: games/valheim-volsync-syncthing-secret
    - match:
        secretKey: SYNCTHING_REMOTE_ADDRESS
        remoteRef:
          remoteKey: games/valheim-volsync-syncthing-secret
    - match:
        secretKey: SYNCTHING_REMOTE_PORT
        remoteRef:
          remoteKey: games/valheim-volsync-syncthing-secret
