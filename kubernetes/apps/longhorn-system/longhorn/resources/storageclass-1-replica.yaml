---
# Default StorageClass for app data PVCs backed by VolSync (1 replica — VolSync provides redundancy)
# Also used for VolSync clone/cache volumes during backup operations.
# Use the explicit 'longhorn' StorageClass for anything that needs 3-replica redundancy without VolSync.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-1-replica
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/component: storage
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  # Single replica for temporary backup clone volumes
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: ext4
  dataLocality: disabled
  disableRevisionCounter: "true"
  dataEngine: v1
  backupTargetName: default
  unmapMarkSnapChainRemoved: ignored

