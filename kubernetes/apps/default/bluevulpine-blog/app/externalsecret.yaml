---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name gitea-registry-creds
spec:
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: *name
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "gitea.derekjacobs.dev": {
                "username": "bluevulpine",
                "password": "{{ .Gitea__Registry_Read }}",
                "auth": "{{ (printf "%s:%s" "bluevulpine" .Gitea__Registry_Read) | b64enc }}"
              }
            }
          }
  dataFrom:
    - extract:
        key: gitea
