---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bluevulpine-blog
  annotations:
    gatus.home-operations.com/endpoint: |
      group: default
      conditions:
        - "[STATUS] == 200"
spec:
  hostnames:
    - "bluevulpine.net"
  parentRefs:
    - name: external
      namespace: network
      sectionName: https
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: bluevulpine-blog
          port: 80
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
# Canonical host is the apex; redirect www -> https://bluevulpine.net (path preserved)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bluevulpine-blog-www
spec:
  hostnames:
    - "www.bluevulpine.net"
  parentRefs:
    - name: external
      namespace: network
      sectionName: https
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: bluevulpine.net
            statusCode: 301
