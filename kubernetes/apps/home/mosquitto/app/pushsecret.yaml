---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: mosquitto-secret-push
  namespace: home
spec:
  refreshInterval: 1h
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: mosquitto-secret
  # TODO: mosquitto-secret uses raw Bitwarden field names (no template).
  # Run: kubectl get secret mosquitto-secret -n home -o jsonpath='{.data}'
  # to discover actual field names, then populate the data section below.
  data:
    - match:
        secretKey: REPLACE_WITH_ACTUAL_FIELD_NAME
        remoteRef:
          remoteKey: home/mosquitto-secret
