---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app radarr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: external-secrets-openbao-store
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/media/radarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
    namespace: flux-system
  targetNamespace: media
  wait: false
  postBuild:
    substitute:
      APP: *app
      NS: media
      GATUS_PORT: "7878"
      GATUS_SERVICE: radarr
      VOLSYNC_CAPACITY: 4Gi
      # High criticality: movie library DB - backup every hour (staggered +5min)
      VOLSYNC_LOCAL_SCHEDULE: "5 * * * *"
      VOLSYNC_STORAGECLASS: longhorn-1-replica
      VOLSYNC_CLONE_STORAGECLASS: longhorn-1-replica
      VOLSYNC_SNAPSHOTCLASS: longhorn-snapclass
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_COPYMETHOD: Snapshot
