---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: readarr-ebooks-secret-push
  namespace: media
spec:
  refreshInterval: 1h
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: readarr-ebooks-secret
  data:
    - match:
        secretKey: READARR__AUTH__APIKEY
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__HOST
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__PORT
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__USER
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__PASSWORD
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__MAINDB
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__LOGDB
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: READARR__POSTGRES__CACHEDB
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: INIT_POSTGRES_HOST
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: INIT_POSTGRES_USER
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: INIT_POSTGRES_PASS
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: INIT_POSTGRES_DBNAME
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
    - match:
        secretKey: INIT_POSTGRES_SUPER_PASS
        remoteRef:
          remoteKey: media/readarr-ebooks-secret
