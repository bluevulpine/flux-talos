---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-configmap
data:
  recyclarr.yml: |
    # yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
    # Configuration for Recyclarr v8 - syncs TRaSH Guides quality profiles
    # Docs: https://recyclarr.dev

    sonarr:
      sonarr:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true

        quality_definition:
          type: series

        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
            reset_unmatched_scores:
              enabled: true
          - trash_id: d1498e7d189fbe6c7110ceaabb7473e6  # WEB-2160p
            reset_unmatched_scores:
              enabled: true
          - trash_id: 20e0fc959f1f1704bed501f23bdae76f  # [Anime] Remux-1080p
            reset_unmatched_scores:
              enabled: true

    radarr:
      radarr:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true

        quality_definition:
          type: movie

        quality_profiles:
          - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
          - trash_id: 64fb5f9858489bdac2af690e27c8f42f  # UHD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
          - trash_id: 9ca12ea80aa55ef916e3751f4b874151  # Remux + WEB 1080p
            reset_unmatched_scores:
              enabled: true
          - trash_id: fd161a61e3ab826d3a22d53f935696dd  # Remux + WEB 2160p
            reset_unmatched_scores:
              enabled: true
          - trash_id: 722b624f9af1e492284c4bc842153a38  # [Anime] Remux-1080p
            reset_unmatched_scores:
              enabled: true

