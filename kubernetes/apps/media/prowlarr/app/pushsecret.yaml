---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: prowlarr-secret-push
  namespace: media
spec:
  refreshInterval: 1h
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: prowlarr-secret
  data:
    - match:
        secretKey: PROWLARR__AUTH__APIKEY
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: PROWLARR__POSTGRES__HOST
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: PROWLARR__POSTGRES__PORT
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: PROWLARR__POSTGRES__USER
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: PROWLARR__POSTGRES__PASSWORD
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: PROWLARR__POSTGRES__MAINDB
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: PROWLARR__POSTGRES__LOGDB
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: INIT_POSTGRES_HOST
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: INIT_POSTGRES_USER
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: INIT_POSTGRES_PASS
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: INIT_POSTGRES_DBNAME
        remoteRef:
          remoteKey: media/prowlarr-secret
    - match:
        secretKey: INIT_POSTGRES_SUPER_PASS
        remoteRef:
          remoteKey: media/prowlarr-secret
