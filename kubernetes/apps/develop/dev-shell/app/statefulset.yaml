---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dev-shell
  labels:
    app.kubernetes.io/name: dev-shell
    app.kubernetes.io/instance: dev-shell
  annotations:
    # Roll the pod when the init scripts or authorized_keys ConfigMaps change
    # (Stakater Reloader is deployed cluster-wide in kube-system).
    reloader.stakater.com/auto: "true"
spec:
  serviceName: dev-shell
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-shell
      app.kubernetes.io/instance: dev-shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-shell
        app.kubernetes.io/instance: dev-shell
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: dev-shell
          # renovate: datasource=docker depName=debian
          image: debian:bookworm-slim@sha256:60eac759739651111db372c07be67863818726f754804b8707c90979bda511df
          securityContext:
            # Boot script needs root to install packages, create the user, and
            # run sshd; sshd then drops to the unprivileged login user per-session.
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          command:
            - /bin/bash
            - /etc/dev-shell/entrypoint.sh
          env:
            - name: USER_NAME
              value: "bluevulpine"
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
            - name: LANG
              value: en_US.UTF-8
            - name: LC_ALL
              value: en_US.UTF-8
          ports:
            - containerPort: 2222
              name: ssh
          readinessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2000m"
              memory: 4Gi
          volumeMounts:
            - name: dev-storage
              mountPath: /home/bluevulpine
            - name: init-scripts
              mountPath: /etc/dev-shell/entrypoint.sh
              subPath: entrypoint.sh
              readOnly: true
            - name: init-scripts
              mountPath: /etc/dev-shell/user-setup.sh
              subPath: user-setup.sh
              readOnly: true
            - name: authorized-keys
              mountPath: /etc/dev-shell/authorized_keys
              subPath: authorized_keys
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: dev-shell-init
            defaultMode: 0755
        - name: authorized-keys
          configMap:
            name: dev-shell-authorized-keys
            defaultMode: 0644
      restartPolicy: Always
  volumeClaimTemplates:
    - metadata:
        name: dev-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 50Gi
