---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dev-shell
  labels:
    app.kubernetes.io/name: dev-shell
    app.kubernetes.io/instance: dev-shell
spec:
  serviceName: dev-shell
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-shell
      app.kubernetes.io/instance: dev-shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-shell
        app.kubernetes.io/instance: dev-shell
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: dev-shell
          # renovate: datasource=docker depName=lscr.io/linuxserver/openssh-server
          image: lscr.io/linuxserver/openssh-server:10.0_p1-r10-ls212@sha256:c6d85b0c137a9920a7769ea00c0052a7779b4ec1e556db49b2700e5f1850fb40
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          command:
            - /init

          ports:
            - containerPort: 2222
              name: ssh
          readinessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            # LSIO openssh-server uses /config as the login user's home directory,
            # so the persistent volume must be mounted there for dotfiles, oh-my-zsh,
            # atuin history and mise toolchains to survive pod restarts.
            - name: dev-storage
              mountPath: /config
            - name: init-script
              mountPath: /custom-cont-init.d
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
            - name: PASSWORD_ACCESS
              value: "true"
            - name: USER_PASSWORD
              value: "dev"
            - name: USER_NAME
              value: "bluevulpine"
            - name: SUDO_ACCESS
              value: "true"
            - name: USER_SHELL
              value: /bin/zsh
            - name: DEBIAN_FRONTEND
              value: noninteractive
            - name: LANG
              value: en_US.UTF-8
            - name: LC_ALL
              value: en_US.UTF-8
      volumes:
        - name: init-script
          configMap:
            name: dev-shell-init
            defaultMode: 0755
      restartPolicy: Always
  volumeClaimTemplates:
    - metadata:
        name: dev-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 50Gi
