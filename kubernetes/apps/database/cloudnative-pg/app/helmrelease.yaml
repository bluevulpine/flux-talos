---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: cloudnative-pg
  driftDetection:
    mode: enabled
  maxHistory: 3
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  # https://github.com/cloudnative-pg/charts/blob/cloudnative-pg-v0.18.1/charts/cloudnative-pg/values.yaml
  values:
    crds:
      create: true
    config:
      data:

    monitoring:
      podMonitorEnabled: true
