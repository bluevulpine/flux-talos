---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: thanos
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: thanos
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: openebs
      namespace: openebs-system
  valuesFrom:
    - targetPath: objstoreConfig.value.config.bucket
      kind: ConfigMap
      name: thanos-bucket
      valuesKey: BUCKET_NAME
    - targetPath: objstoreConfig.value.config.endpoint
      kind: Secret
      name: thanos-bucket
      valuesKey: BUCKET_HOST
    - targetPath: objstoreConfig.value.config.region
      kind: ConfigMap
      name: thanos-bucket
      valuesKey: BUCKET_REGION
    - targetPath: objstoreConfig.value.config.access_key
      kind: Secret
      name: thanos-bucket
      valuesKey: AWS_ACCESS_KEY_ID
    - targetPath: objstoreConfig.value.config.secret_key
      kind: Secret
      name: thanos-bucket
      valuesKey: AWS_SECRET_ACCESS_KEY
  values:
    objstoreConfig:
      value:
        type: s3
        config:
          insecure: true # Garage S3 API uses HTTP
    additionalEndpoints:
      - dnssrv+_grpc._tcp.kube-prometheus-stack-thanos-discovery.observability.svc.cluster.local
    additionalReplicaLabels:
      - "__replica__"
    serviceMonitor:
      enabled: true
    compact:
      enabled: true
      extraArgs:
        - --compact.concurrency=4
        - --delete-delay=30m
        - --retention.resolution-raw=14d
        - --retention.resolution-5m=30d
        - --retention.resolution-1h=60d
      persistence: &persistence
        enabled: true
        storageClass: longhorn-1-replica
        size: 20Gi
    query:
      replicas: 2
      extraArgs:
        - "--alert.query-url=https://thanos.${SECRET_DOMAIN}"
    queryFrontend:
      enabled: true
      replicas: 2
      extraEnv: &extraEnv
        - name: THANOS_CACHE_CONFIG
          valueFrom:
            configMapKeyRef:
              name: &configMap thanos-cache-configmap
              key: cache.yaml
      extraArgs:
        - "--query-range.response-cache-config=$(THANOS_CACHE_CONFIG)"
      ingress:
        enabled: false
      podAnnotations: &podAnnotations
        configmap.reloader.stakater.com/reload: *configMap
    rule:
      enabled: true
      replicas: 2
      extraArgs:
        - "--web.prefix-header=X-Forwarded-Prefix"
      alertmanagersConfig:
        value: |-
          alertmanagers:
            - api_version: v2
              static_configs:
                - dnssrv+_http-web._tcp.alertmanager-operated.observability.svc.cluster.local
      rules:
        value: |-
          groups:
            - name: PrometheusWatcher
              rules:
                - alert: PrometheusDown
                  annotations:
                    summary: A Prometheus has disappeared from Prometheus target discovery
                  expr: absent(up{job="kube-prometheus-stack-prometheus"})
                  for: 5m
                  labels:
                    severity: critical
      persistence: *persistence
    storeGateway:
      # Single replica: Thanos v0.41.0 regression (thanos-io/thanos#8711) makes
      # Query's /metrics return HTTP 500 when two store-gateways read the same
      # bucket and advertise identical external labels — they collide on the
      # thanos_store_nodes_grpc_connections series, failing the whole scrape and
      # firing TargetDown. One store endpoint avoids the duplicate. Store-gateway
      # is a stateless read layer over object storage (recent data is served by
      # the HA sidecars), so dropping to one replica is acceptable here.
      # Revert to replicas: 2 once #8711 is fixed in a stable release.
      replicas: 1
      extraEnv: *extraEnv
      # Lazy index-header reader: by default store-gateway eagerly memory-maps
      # every block's index-header at startup, which fills the cgroup limit with
      # reclaimable page cache (working_set tracks the limit and trips
      # ContainerMemoryCritical even though anonymous RSS is only ~220Mi). Lazy
      # reader maps a block's index-header only when it is queried and releases
      # it after the idle timeout, keeping memory bounded — important now that a
      # single replica serves all store-API load.
      extraArgs:
        - "--index-cache.config=$(THANOS_CACHE_CONFIG)"
        - --store.enable-index-header-lazy-reader
      persistence: *persistence
      podAnnotations: *podAnnotations
      # Reverted to the original 512Mi/1Gi: the earlier 2Gi limit only gave the
      # reclaimable index-header page cache more room to expand into and caused
      # the OOM-imminent alert. With the lazy reader above, 1Gi is comfortable
      # (these replicas ran at ~400Mi working_set under a 1Gi limit for months).
      resources:
        requests:
          cpu: 10m
          memory: 512Mi
        limits:
          memory: 1Gi
